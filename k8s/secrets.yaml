# IMPORTANT: This is a template. Create actual secrets with:
# kubectl create secret generic videoshift-secrets \
#   --namespace=videoshift \
#   --from-literal=database-password='your-secure-password' \
#   --from-literal=jwt-secret='your-jwt-secret' \
#   --from-literal=stripe-secret-key='sk_live_xxx' \
#   --from-literal=stripe-webhook-secret='whsec_xxx' \
#   --from-literal=aws-access-key-id='xxx' \
#   --from-literal=aws-secret-access-key='xxx'

apiVersion: v1
kind: Secret
metadata:
  name: videoshift-secrets
  namespace: videoshift
type: Opaque
stringData:
  database-password: CHANGE_ME
  jwt-secret: CHANGE_ME
  stripe-secret-key: CHANGE_ME
  stripe-webhook-secret: CHANGE_ME
  aws-access-key-id: CHANGE_ME
  aws-secret-access-key: CHANGE_ME
